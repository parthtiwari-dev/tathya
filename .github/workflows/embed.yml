name: Embed persisted signals

on:
  workflow_dispatch:
  schedule:
    - cron: "35 */2 * * *"   # offset after ingest.yml's :17 so embedding runs against fresh signals

permissions:
  contents: read

jobs:
  embed:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install pipeline with embeddings extra
        run: python -m pip install ".[embeddings]"
      - name: Embed unembedded signals
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python -m pipeline.embed_signals --limit 200
